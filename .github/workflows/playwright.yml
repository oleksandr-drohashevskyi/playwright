name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # ENV для Playwright config (process.env.*)
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      HTTP_USER: ${{ secrets.HTTP_USER }}
      HTTP_PASS: ${{ secrets.HTTP_PASS }}
      # Опционально: если ENV=staging/prod в utils/env.js
      # ENV: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      # Артефакты (HTML report)
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # Дополнительно: test-results (скриншоты/видео/trace)
      - name: Upload Playwright test-results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30